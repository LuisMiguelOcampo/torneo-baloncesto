<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Mesa de Control</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4 font-sans text-slate-100">

    <div class="max-w-md w-full bg-slate-800 p-8 rounded-3xl shadow-xl border border-slate-700/50 space-y-6">
        <div class="text-center space-y-2">
            <span class="text-4xl block">🏀</span>
            <h1 class="text-xl font-black tracking-tight uppercase">Mesa de Control</h1>
            <p class="text-xs text-slate-400 font-medium">Ingresa tus credenciales de administrador municipal</p>
        </div>

        <form id="form-login" onsubmit="procesarLogin(event)" class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Correo Electrónico</label>
                <input type="email" id="login-email" required placeholder="admin@municipio.gov.co" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm font-medium focus:outline-none focus:border-blue-500 transition-all text-white">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Contraseña</label>
                <input type="password" id="login-password" required placeholder="••••••••" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm font-medium focus:outline-none focus:border-blue-500 transition-all text-white">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs p-3.5 rounded-xl tracking-wider uppercase shadow-md transition-all cursor-pointer pt-3">Ingresar al Panel</button>
        </form>
        
        <div class="text-center pt-2">
            <a href="index.html" class="text-xs text-slate-400 hover:text-slate-300 font-medium transition-all">← Volver a la Tabla Pública</a>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE SUPABASE (Reemplaza con tus llaves)
        const SUPABASE_URL = 'https://vzouznekqycalzgswxos.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_Tm-IBIr0gRvjTWFhF5LNuQ_rMsgP3vo';
        const supabaseLogin = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Redirigir automáticamente si ya hay una sesión activa
        supabaseLogin.auth.onAuthStateChange((event, session) => {
            if (session) {
                window.location.replace('admin.html');
            }
        });

        async function procesarLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            try {
                const { error } = await supabaseLogin.auth.signInWithPassword({ email, password });
                if (error) throw error;
                // La redirección la maneja automáticamente el onAuthStateChange de arriba
            } catch (err) {
                alert("⚠️ Error de autenticación: " + err.message);
            }
        }
    </script>
</body>
</html>
